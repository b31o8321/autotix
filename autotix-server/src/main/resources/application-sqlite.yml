spring:
  datasource:
    url: jdbc:sqlite:${SQLITE_PATH:./data/autotix.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1        # SQLite only supports one writer at a time
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-init-sql: "PRAGMA journal_mode=WAL; PRAGMA foreign_keys=ON;"
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-sqlite.sql
      data-locations: classpath:data.sql
      continue-on-error: true
