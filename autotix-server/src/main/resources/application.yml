server:
  port: 8080

spring:
  profiles:
    active: ${AUTOTIX_PROFILE:h2}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

autotix:
  lock: memory       # memory | redis
  queue: memory      # memory | kafka | rabbitmq
  cache: caffeine    # caffeine | redis

  auth:
    jwt-secret: ${AUTOTIX_JWT_SECRET:dev-change-me-in-prod-must-be-32+chars-or-longer}
    access-ttl-minutes: 60
    refresh-ttl-days: 30
    bootstrap-admin-email: ${AUTOTIX_ADMIN_EMAIL:admin@autotix.local}
    bootstrap-admin-password: ${AUTOTIX_ADMIN_PASSWORD:admin}

  ai:
    endpoint: https://api.openai.com/v1
    api-key: ${AUTOTIX_AI_KEY:}
    model: gpt-4o
    system-prompt: |
      You are a professional customer support assistant.
      Reply politely and concisely in the customer's language.

  ticket:
    # Number of days a SOLVED ticket can be reopened by a new customer message.
    # After this window the inbound spawns a new child ticket instead.
    reopen-window-days: ${AUTOTIX_REOPEN_WINDOW_DAYS:7}
    # How often the auto-close scheduler checks for expired SOLVED tickets (ms).
    auto-close-check-interval-ms: ${AUTOTIX_AUTO_CLOSE_INTERVAL_MS:3600000}

  sla:
    # How often the SLA breach checker runs (ms). Default: 60 seconds.
    check-interval-ms: ${AUTOTIX_SLA_CHECK_INTERVAL_MS:60000}

  email:
    # IMAP poll cadence. Override via AUTOTIX_EMAIL_POLL_INTERVAL_MS env var
    # (docker-compose sets 15s for dev/e2e; production 60s is fine).
    poll-interval-ms: ${AUTOTIX_EMAIL_POLL_INTERVAL_MS:60000}

  storage:
    driver: local       # local | s3 | oss
    max-upload-bytes: 10485760   # 10 MB
    local:
      root: /data/attachments
    s3:
      endpoint: ""
      region: us-east-1
      bucket: autotix
      access-key: ""
      secret-key: ""
      path-style: false
    oss:
      endpoint: ""
      bucket: autotix
      access-key-id: ""
      access-key-secret: ""
