server:
  port: 8080

spring:
  profiles:
    active: ${AUTOTIX_PROFILE:h2}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

autotix:
  lock: memory       # memory | redis
  queue: memory      # memory | kafka | rabbitmq
  cache: caffeine    # caffeine | redis

  auth:
    jwt-secret: ${AUTOTIX_JWT_SECRET:dev-change-me-in-prod-must-be-32+chars-or-longer}
    access-ttl-minutes: 60
    refresh-ttl-days: 30
    bootstrap-admin-email: ${AUTOTIX_ADMIN_EMAIL:admin@autotix.local}
    bootstrap-admin-password: ${AUTOTIX_ADMIN_PASSWORD:admin}

  ai:
    endpoint: https://api.openai.com/v1
    api-key: ${AUTOTIX_AI_KEY:}
    model: gpt-4o
    system-prompt: |
      You are a professional customer support assistant.
      Reply politely and concisely in the customer's language.
