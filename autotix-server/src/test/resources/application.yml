# Test profile — H2 in-memory, minimal config.
server:
  port: 0     # random
spring:
  datasource:
    url: jdbc:h2:mem:autotix-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

autotix:
  lock: memory
  queue: memory
  cache: caffeine
  auth:
    jwt-secret: test-jwt-secret-must-be-at-least-32-characters-long
    access-ttl-minutes: 10
    refresh-ttl-days: 1
    bootstrap-admin-email: admin@test.local
    bootstrap-admin-password: test-admin
  ai:
    endpoint: http://localhost:0/never-called
    api-key: test
    model: test-model
    system-prompt: test
